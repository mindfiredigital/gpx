name: Build Binary

on:
  workflow_run:
    workflows:
      - Release workflow gpx
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            target: bun-windows-x64
            artifact: gpx-windows-x64.exe

          - os: windows-latest
            target: bun-windows-arm64
            artifact: gpx-windows-arm64.exe

          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: gpx-linux-x64

          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: gpx-linux-arm64

          - os: macos-latest
            target: bun-darwin-arm64
            artifact: gpx-darwin-arm64

          - os: macos-latest
            target: bun-darwin-x64
            artifact: gpx-darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p dist
          bun build ./src/cli.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact }}

      - name: Archive Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries
          merge-multiple: true

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: binaries/*